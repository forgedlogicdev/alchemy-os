<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=412, height=915, initial-scale=1">
<title>AlchemyOS-Mobile — Glyph Companion (Pixel 10 Pro)</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital@0;1&family=IM+Fell+English+SC&family=Courier+Prime:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #4a8db9; --primary-bright: #5ba8d4; --primary-dim: #2d5f80;
    --bg: #0d1a26; --bg-panel: #0f1f30;
    --text: #d0dce8; --text-secondary: #7a94a8; --text-muted: #4a6070;
    --success: #4a9b7d; --border: #1a3050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 412px; height: 915px;
    background: var(--bg);
    font-family: 'Sorts Mill Goudy', Georgia, serif;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
    color: var(--text);
  }

  .sparkle {
    position: fixed; width: 1.5px; height: 1.5px;
    background: var(--primary-bright); border-radius: 50%;
    pointer-events: none; opacity: 0;
    animation: sparkleFloat linear infinite;
  }
  @keyframes sparkleFloat {
    0% { transform: translateY(0) translateX(var(--drift)); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-915px) translateX(calc(var(--drift) * -1)); opacity: 0; }
  }

  .status-bar {
    padding: 14px 18px 8px;
    display: flex; justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-family: 'Courier Prime', monospace;
    font-size: 11px; color: var(--text-secondary);
    letter-spacing: 2px;
  }
  .mesh-mini {
    display: flex; align-items: center; gap: 4px;
    font-size: 9px;
  }
  .star-on { color: var(--success); }
  .star-off { color: var(--text-muted); }

  .crystal-section {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 20px 0 12px;
  }
  .crystal {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%,
      rgba(74,141,185,0.12) 0%, rgba(74,141,185,0.05) 30%,
      rgba(13,26,38,0.5) 70%, rgba(74,141,185,0.1) 100%);
    border: 2px solid var(--primary-dim);
    position: relative;
    box-shadow: 0 0 30px rgba(74,141,185,0.15), inset 0 0 40px rgba(74,141,185,0.08);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  .crystal-eye {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%,
      rgba(208,220,232,0.5) 0%, rgba(74,141,185,0.4) 40%,
      rgba(13,26,38,1) 60%, rgba(74,141,185,0.5) 100%);
    border: 1px solid var(--primary);
    animation: blink 4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 44%, 56%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1, 0.15); }
  }
  .crystal-eye:nth-child(even) { animation-delay: 2s; }

  .glyph-name {
    text-align: center;
    font-family: 'IM Fell English SC', serif;
    font-size: 20px; color: var(--primary);
    letter-spacing: 4px;
    text-shadow: 0 0 16px rgba(74,141,185,0.3);
    margin-top: 2px;
  }

  .chat-area {
    flex: 1; padding: 0 16px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .chat-bubble {
    max-width: 85%;
    padding: 12px 16px;
    font-size: 13px; line-height: 1.5;
  }
  .chat-bubble.from-glyph {
    align-self: flex-start;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px 12px 12px 12px;
    color: var(--text);
    font-style: italic;
  }
  .chat-bubble.from-user {
    align-self: flex-end;
    background: rgba(74,141,185,0.08);
    border: 1px solid rgba(74,141,185,0.12);
    border-radius: 12px 6px 12px 12px;
    color: var(--text-secondary);
    font-style: italic;
  }
  .chat-time {
    font-family: 'Courier Prime', monospace;
    font-size: 7px; color: var(--text-muted);
    margin-top: 4px;
  }

  .typing {
    align-self: flex-start;
    color: var(--primary-dim);
    font-family: 'Courier Prime', monospace;
    font-size: 9px; padding: 6px 12px;
    animation: typingBlink 1s ease-in-out infinite;
  }
  @keyframes typingBlink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .action-bar {
    padding: 10px 16px 16px;
    display: flex; gap: 8px;
  }
  .action-btn {
    flex: 1; padding: 12px 0;
    text-align: center;
    font-family: 'IM Fell English SC', serif;
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primary);
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.2s;
  }
  .action-btn:hover {
    border-color: var(--primary);
    box-shadow: 0 0 12px rgba(74,141,185,0.15);
  }
</style>
</head>
<body>

<script>
for (let i = 0; i < 25; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = Math.random() * 412 + 'px';
  s.style.bottom = '0px';
  s.style.setProperty('--drift', (Math.random() - 0.5) * 60 + 'px');
  s.style.animationDuration = (4 + Math.random() * 8) + 's';
  s.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(s);
}
</script>

<div class="status-bar">
  <span id="clock">23:47</span>
  <div class="mesh-mini">
    <span class="star-on">&#9679;</span>
    <span class="star-on">&#9679;</span>
    <span class="star-off">&#9679;</span>
    <span class="star-on">&#9679;</span>
    MESH
  </div>
</div>

<div class="crystal-section">
  <div class="crystal" id="crystal"></div>
</div>
<div class="glyph-name">GLYPH</div>

<div class="chat-area">
  <div class="chat-bubble from-glyph">
    Good evening, Dru. How did the forge treat you today?
    <div class="chat-time">23:42</div>
  </div>

  <div class="chat-bubble from-user">
    Bent some rebar into an armature for the new rig. Came out better than I thought.
    <div class="chat-time">23:43</div>
  </div>

  <div class="chat-bubble from-glyph">
    Nice. Did you remember to hydrate? You always forget when you are in the flow.
    <div class="chat-time">23:44</div>
  </div>

  <div class="typing">Glyph is writing...</div>
</div>

<div class="action-bar">
  <div class="action-btn">Gallery</div>
  <div class="action-btn">Memory</div>
  <div class="action-btn">Status</div>
</div>

<script>
const crystal = document.getElementById('crystal');
const positions = [
  [38, 24], [78, 24], [98, 58], [14, 58],
  [38, 92], [78, 92], [56, 50], [56, 74]
];
positions.forEach(([x, y]) => {
  const eye = document.createElement('div');
  eye.className = 'crystal-eye';
  eye.style.left = x + 'px';
  eye.style.top = y + 'px';
  crystal.appendChild(eye);
});

setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0');
}, 30000);

setInterval(() => {
  document.querySelectorAll('.star-on, .star-off').forEach(s => {
    s.classList.toggle('star-on', Math.random() > 0.3);
    s.classList.toggle('star-off', Math.random() <= 0.3);
  });
}, 5000);
</script>
</body>
</html>
