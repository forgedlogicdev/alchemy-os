<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=520">
<title>AlchemyOS-Deck — Stream Deck Neo</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=IM+Fell+English+SC&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #4a8db9; --primary-bright: #5ba8d4; --primary-dim: #2d5f80;
    --red: #c0392b; --red-bright: #e74c3c; --red-dim: #7b241c;
    --bg: #0d1a26; --bg-panel: #0f1f30;
    --text: #d0dce8; --text-secondary: #7a94a8; --text-muted: #4a6070;
    --success: #4a9b7d; --border: #1a3050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px; height: 520px;
    background: var(--bg);
    font-family: 'Sorts Mill Goudy', Georgia, serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    overflow: hidden;
  }

  .sparkle {
    position: fixed; width: 1px; height: 1px;
    background: var(--primary-bright); border-radius: 50%;
    pointer-events: none; opacity: 0;
    animation: sparkleFloat linear infinite;
  }
  .sparkle.red { background: var(--red-bright); }
  @keyframes sparkleFloat {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-520px); opacity: 0; }
  }

  .deck {
    background: linear-gradient(180deg, #152838 0%, #0a1520 100%);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
  }

  .lcd {
    width: 496px; height: 58px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    padding: 8px 12px;
    display: flex; align-items: center;
    gap: 10px;
  }
  .lcd-label {
    font-family: 'IM Fell English SC', serif;
    font-size: 13px; color: var(--primary);
    letter-spacing: 2px;
  }
  .lcd-fft {
    flex: 1; height: 42px;
    display: flex; align-items: flex-end;
    gap: 1px;
  }
  .fft-bar {
    width: 3px;
    background: linear-gradient(0deg, var(--primary), var(--primary-bright));
    border-radius: 1px 1px 0 0;
    animation: fftDance 0.3s ease-in-out infinite alternate;
  }
  @keyframes fftDance {
    from { transform: scaleY(0.5); }
    to { transform: scaleY(1); }
  }

  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
  }
  .key {
    width: 96px; height: 96px;
    background: linear-gradient(145deg, #152840 0%, #0a1520 100%);
    border: 1px solid var(--primary-dim);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: all 0.15s;
  }
  .key:hover {
    border-color: var(--primary);
    box-shadow: 0 0 16px rgba(74,141,185,0.2), 0 0 24px rgba(231,76,60,0.08);
  }
  .key-symbol {
    font-size: 30px; color: var(--primary-bright);
    text-shadow: 0 0 10px rgba(74,141,185,0.3);
    transition: color 0.3s;
  }
  .key:hover .key-symbol { color: var(--red-bright); }
  .key-num {
    position: absolute; bottom: 3px;
    font-family: 'Courier Prime', monospace;
    font-size: 7px; color: var(--text-muted);
  }
  .key.ask {
    border-color: var(--primary);
    background: linear-gradient(145deg, #1a3048 0%, #0a1520 100%);
  }
  .key.ask .ask-label {
    font-family: 'IM Fell English SC', serif;
    font-size: 9px; color: var(--primary);
    letter-spacing: 1px; text-align: center;
    line-height: 1.3;
  }

  .mode-bar {
    display: flex; gap: 6px;
    margin-top: 10px; justify-content: center;
  }
  .mode-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(74,141,185,0.15);
    border: 1px solid rgba(74,141,185,0.2);
  }
  .mode-dot.active {
    background: var(--primary);
    border-color: var(--primary-bright);
    box-shadow: 0 0 6px var(--primary);
  }
  .mode-label {
    font-family: 'Courier Prime', monospace;
    font-size: 8px; color: var(--text-secondary);
    letter-spacing: 1px; text-align: center; margin-top: 5px;
  }
</style>
</head>
<body>

<script>
for (let i = 0; i < 20; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle' + (i % 3 === 0 ? ' red' : '');
  s.style.left = Math.random() * 600 + 'px';
  s.style.bottom = '0px';
  s.style.animationDuration = (4 + Math.random() * 8) + 's';
  s.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(s);
}
</script>

<div class="deck">
  <!-- LCD -->
  <div class="lcd">
    <div class="lcd-label">ENGINE</div>
    <div class="lcd-fft" id="fft"></div>
  </div>

  <!-- Keys -->
  <div class="keys">
    <div class="key"><span class="key-symbol">◆</span><span class="key-num">1</span></div>
    <div class="key"><span class="key-symbol">◇</span><span class="key-num">2</span></div>
    <div class="key"><span class="key-symbol">◈</span><span class="key-num">3</span></div>
    <div class="key"><span class="key-symbol">⬡</span><span class="key-num">4</span></div>
    <div class="key"><span class="key-symbol">✦</span><span class="key-num">5</span></div>
    <div class="key"><span class="key-symbol">✧</span><span class="key-num">6</span></div>
    <div class="key"><span class="key-symbol">⬢</span><span class="key-num">7</span></div>
    <div class="key ask">
      <span class="ask-label">ASK<br>ADIA</span>
      <span class="key-num">8</span>
    </div>
  </div>

  <div class="mode-bar">
    <div class="mode-dot active"></div>
    <div class="mode-dot"></div>
    <div class="mode-dot"></div>
    <div class="mode-dot"></div>
    <div class="mode-dot"></div>
  </div>
  <div class="mode-label">VISUALIZER // MANDALA</div>
</div>

<script>
const fft = document.getElementById('fft');
for (let i = 0; i < 80; i++) {
  const bar = document.createElement('div');
  bar.className = 'fft-bar';
  bar.style.height = (12 + Math.sin(i * 0.3) * 14 + Math.random() * 8) + 'px';
  bar.style.animationDelay = (i * 0.01) + 's';
  fft.appendChild(bar);
}

setInterval(() => {
  document.querySelectorAll('.fft-bar').forEach((bar, i) => {
    bar.style.height = (8 + Math.sin(Date.now()/200 + i*0.2) * 16 + Math.random() * 5) + 'px';
  });
}, 150);

let modeIdx = 0;
const modes = ['VISUALIZER','DIAGNOSTICS','AUTOMATION','SEQUENCER','COMPANION'];
const details = ['MANDALA','METRICS','PIPELINE','120 BPM','ADIA CHAT'];
setInterval(() => {
  document.querySelectorAll('.mode-dot').forEach((d,i) => d.classList.toggle('active', i===modeIdx));
  document.querySelector('.mode-label').innerHTML = modes[modeIdx] + ' // ' + details[modeIdx];
  modeIdx = (modeIdx + 1) % 5;
}, 4000);
</script>
</body>
</html>
