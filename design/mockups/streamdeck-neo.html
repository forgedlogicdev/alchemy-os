<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=520">
<title>AlchemyOS-Deck — Stream Deck Neo</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English+SC&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-bright: #e8c854; --gold-dim: #8a6d2b;
    --emerald: #2d6a4f; --purple: #4a0e4e; --crimson: #8b1a1a;
    --parchment: #f4e4c1; --parchment-dark: #d4c4a0;
    --ink: #1a1a2e; --charcoal: #2c1810; --silver: #8a9597;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px; height: 520px;
    background: var(--charcoal);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    font-family: 'Courier Prime', monospace;
    overflow: hidden;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139,109,43,0.04) 3px, rgba(139,109,43,0.04) 4px);
  }

  .sparkle {
    position: fixed; width: 1px; height: 1px;
    background: var(--gold-bright); border-radius: 50%;
    pointer-events: none; opacity: 0;
    animation: sparkleFloat linear infinite;
  }
  @keyframes sparkleFloat {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-520px); opacity: 0; }
  }

  .deck {
    background: linear-gradient(180deg, #3a2218 0%, #1a0e08 100%);
    border: 3px solid var(--gold-dim);
    border-radius: 12px;
    padding: 20px 18px;
    box-shadow: 0 0 40px rgba(201,168,76,0.1), inset 0 0 20px rgba(0,0,0,0.4);
    position: relative; z-index: 2;
  }
  .deck::before {
    content: ''; position: absolute; inset: 3px; border: 1px solid rgba(201,168,76,0.12); border-radius: 10px; pointer-events: none;
  }

  .deck-frame-top {
    text-align: center; margin-bottom: 4px;
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 14px; color: var(--gold-dim);
    letter-spacing: 3px;
  }

  /* LCD - like a scroll */
  .lcd {
    width: 496px; height: 58px;
    background: var(--parchment);
    border: 2px solid var(--gold-dim);
    border-radius: 4px;
    margin-bottom: 14px;
    padding: 8px 12px;
    position: relative;
    overflow: hidden;
    display: flex; align-items: center;
  }
  .lcd::before {
    content: ''; position: absolute; inset: 3px; border: 1px solid rgba(201,168,76,0.2);
  }
  .lcd-label {
    font-family: 'IM Fell English SC', serif;
    font-size: 14px; color: var(--ink);
    letter-spacing: 3px; text-transform: uppercase;
  }
  .lcd-element {
    font-size: 18px; margin: 0 8px; color: var(--ink);
  }
  .lcd-fft {
    flex: 2; height: 40px;
    display: flex; align-items: flex-end;
    gap: 1px;
  }
  .fft-bar {
    width: 3px;
    background: linear-gradient(0deg, var(--gold) 0%, var(--crimson) 50%, var(--gold-dim) 100%);
    border-radius: 1px 1px 0 0;
    animation: fftDance 0.3s ease-in-out infinite alternate;
  }
  @keyframes fftDance {
    from { transform: scaleY(0.6); }
    to { transform: scaleY(1); }
  }

  /* Keys - like alchemical seals */
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
  }
  .key {
    width: 96px; height: 96px;
    background: linear-gradient(145deg, #3a2218 0%, #1a0e08 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    transition: all 0.15s ease;
  }
  .key::before {
    content: ''; position: absolute; inset: 3px; border: 1px solid rgba(201,168,76,0.1); border-radius: 6px;
  }
  .key:hover {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.25);
  }

  /* Alchemical symbols on keys */
  .key-symbol {
    font-size: 36px; color: var(--gold);
    text-shadow: 0 0 10px rgba(201,168,76,0.4);
    animation: sealGlow 3s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes sealGlow {
    0%, 100% { text-shadow: 0 0 6px rgba(201,168,76,0.3); }
    50% { text-shadow: 0 0 16px rgba(201,168,76,0.7); }
  }
  .key:nth-child(odd) .key-symbol { animation-delay: 1.5s; }

  .key-number {
    position: absolute; bottom: 4px;
    font-family: 'Courier Prime', monospace;
    font-size: 7px; color: rgba(201,168,76,0.3);
    letter-spacing: 1px;
  }

  /* Key 7 - ASK ADIA */
  .key.ask-adia {
    border-color: rgba(201,168,76,0.5);
    background: linear-gradient(145deg, #3a2828 0%, #1a0e08 100%);
  }
  .key.ask-adia .key-label {
    font-family: 'IM Fell English SC', serif;
    font-size: 9px; color: var(--gold);
    letter-spacing: 2px; text-align: center;
    text-transform: uppercase; line-height: 1.4; z-index: 1;
  }

  /* Mode dots - like planetary alignment */
  .mode-bar {
    display: flex; gap: 8px;
    margin-top: 12px; justify-content: center;
    align-items: center;
  }
  .mode-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(139,109,43,0.2);
    border: 1px solid rgba(201,168,76,0.2);
  }
  .mode-dot.active {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .mode-label {
    font-family: 'Courier Prime', monospace;
    font-size: 9px; color: var(--parchment-dark);
    letter-spacing: 2px; text-align: center;
    margin-top: 6px;
  }

  .sundial-line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 6px auto 0;
  }
</style>
</head>
<body>

<script>
for (let i = 0; i < 20; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = Math.random() * 600 + 'px';
  s.style.bottom = '0px';
  s.style.animationDuration = (4 + Math.random() * 8) + 's';
  s.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(s);
}
</script>

<div class="deck">
  <div class="deck-frame-top">✧ ALCAHEST ENGINE ✧</div>

  <!-- LCD Bar - The Scroll -->
  <div class="lcd">
    <div class="lcd-label">GRIMOIRE</div>
    <div class="lcd-element">◆</div>
    <div class="lcd-fft" id="fft"></div>
  </div>

  <!-- Keys - Alchemical Seals -->
  <div class="keys">
    <div class="key"><span class="key-symbol">🜂</span><span class="key-number">I</span></div>
    <div class="key"><span class="key-symbol">🜄</span><span class="key-number">II</span></div>
    <div class="key"><span class="key-symbol">🜁</span><span class="key-number">III</span></div>
    <div class="key"><span class="key-symbol">🜃</span><span class="key-number">IV</span></div>
    <div class="key"><span class="key-symbol">🜍</span><span class="key-number">V</span></div>
    <div class="key"><span class="key-symbol">🜔</span><span class="key-number">VI</span></div>
    <div class="key"><span class="key-symbol">🜘</span><span class="key-number">VII</span></div>
    <div class="key ask-adia">
      <div class="key-label">Ask<br>Adia</div>
      <span class="key-number">VIII</span>
    </div>
  </div>

  <!-- Mode indicator -->
  <div class="mode-bar">
    <div class="mode-dot active"></div>
    <div class="mode-dot"></div>
    <div class="mode-dot"></div>
    <div class="mode-dot"></div>
    <div class="mode-dot"></div>
  </div>
  <div class="mode-label">SCRYING MIRROR ◇ MANDALA OF FLAME</div>
  <div class="sundial-line"></div>
</div>

<script>
const fft = document.getElementById('fft');
for (let i = 0; i < 80; i++) {
  const bar = document.createElement('div');
  bar.className = 'fft-bar';
  bar.style.height = (14 + Math.sin(i * 0.4) * 13 + Math.random() * 8) + 'px';
  bar.style.animationDelay = (i * 0.01) + 's';
  fft.appendChild(bar);
}

setInterval(() => {
  document.querySelectorAll('.fft-bar').forEach((bar, i) => {
    bar.style.height = (8 + Math.sin(Date.now()/200 + i*0.25) * 16 + Math.random() * 6) + 'px';
  });
}, 150);

let modeIdx = 0;
const stageNames = ['SCRYING MIRROR','APOTHECARY','GREAT WORK','FORMULA','HOMUNCULUS'];
const detailNames = ['MANDALA OF FLAME','HUMOURS BALANCED','MAGNUM OPUS','120 ♩','ADIA SPEAKS'];

setInterval(() => {
  document.querySelectorAll('.mode-dot').forEach((d,i) => d.classList.toggle('active', i===modeIdx));
  document.querySelector('.mode-label').innerHTML = stageNames[modeIdx] + ' ◇ ' + detailNames[modeIdx];
  modeIdx = (modeIdx + 1) % 5;
}, 5000);
</script>
</body>
</html>
